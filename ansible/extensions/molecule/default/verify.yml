---
- name: Verify
  hosts: all
  gather_facts: true
  tasks:
    - name: Collect installed package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert docker packages are installed
      ansible.builtin.assert:
        that:
          - "'docker-ce' in ansible_facts.packages"
          - "'docker-ce-cli' in ansible_facts.packages"
          - "'containerd.io' in ansible_facts.packages"
          - "'docker-compose-plugin' in ansible_facts.packages"

    - name: Read docker daemon configuration
      ansible.builtin.slurp:
        src: /etc/docker/daemon.json
      register: docker_daemon_json_raw

    - name: Parse docker daemon configuration
      ansible.builtin.set_fact:
        docker_daemon_json: "{{ docker_daemon_json_raw.content | b64decode | from_json }}"

    - name: Assert daemon config has expected settings
      ansible.builtin.assert:
        that:
          - "docker_daemon_json['log-driver'] == 'journald'"
          - "docker_daemon_json['firewall-backend'] == 'nftables'"
          - "docker_daemon_json['ipv6'] | bool"
