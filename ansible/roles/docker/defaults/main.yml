---
docker_manage_repo: true
docker_repo_name: docker-ce-stable
docker_repo_description: Docker CE Stable - $basearch
docker_repo_baseurl: https://download.docker.com/linux/centos/$releasever/$basearch/stable
docker_repo_gpgkey: https://download.docker.com/linux/centos/gpg

docker_prereq_packages:
  - dnf-plugins-core

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_service_name: docker
docker_manage_service: true
docker_service_enabled: true
docker_service_state: started

docker_daemon_json_path: /etc/docker/daemon.json
docker_daemon_log_driver: journald
docker_daemon_firewall_backend: nftables
docker_daemon_ipv6: true
docker_daemon_fixed_cidr_v6: fd00:dead:beef::/48
